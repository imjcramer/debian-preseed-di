##########  Debian Preseed Installation  ##########
# Common answers. Additional fragments are chained from common.cfg so their
# repository-relative paths stay explicit in the shared include point.
d-i preseed/include string common.cfg

# Preseed include command
d-i preseed/include_command string \
  /bin/sh -c 'set -eu; \
    RUNTIME_DIR=/tmp/install-runtime; \
    BOOTSTRAP_DIR=$RUNTIME_DIR/bootstrap; \
    LOG_DIR=/tmp/preseed-logs; \
    HELPER=$BOOTSTRAP_DIR/preseed-bootstrap-entry.sh; \
    SEED_URL_PATH=$BOOTSTRAP_DIR/seed.url; \
    SEED_FILE_PATH=$BOOTSTRAP_DIR/seed.file; \
    mkdir -p "$BOOTSTRAP_DIR"; \
    normalize_seed_base() { \
      seed_value=$1; seed_type=$2; seed_label=$3; \
      seed_value=${seed_value%%\\?*}; \
      case "$seed_value" in */*.cfg) seed_value=${seed_value%/*};; esac; \
      while [ "${#seed_value}" -gt 1 ]; do case "$seed_value" in */) seed_value=${seed_value%/};; *) break;; esac; done; \
      case "$seed_type" in \
        file) \
          case "$seed_value" in /*) ;; *) echo "fatal: ${seed_label} file base must be an absolute path for include_command: ${seed_value:-unset}" >&2; exit 1;; esac; \
          case "$seed_value" in *..*|*//*) echo "fatal: ${seed_label} file base contains unsupported traversal for include_command: $seed_value" >&2; exit 1;; esac; \
          ;; \
        url) \
          [ -n "$seed_value" ] || { echo "fatal: ${seed_label} URL base is empty for include_command" >&2; exit 1; }; \
          ;; \
        *) \
          echo "fatal: unsupported installation source type for include_command: ${seed_type}" >&2; exit 1; \
          ;; \
      esac; \
      printf "%s\n" "$seed_value"; \
    }; \
    choose_seed_base() { \
      seed_url_base=$1; seed_file_base=$2; seed_label=$3; \
      [ -z "$seed_url_base" ] || [ -z "$seed_file_base" ] || { echo "fatal: ${seed_label} defines both URL and file seed sources for include_command" >&2; exit 1; }; \
      if [ -n "$seed_url_base" ]; then normalize_seed_base "$seed_url_base" url "$seed_label"; return 0; fi; \
      if [ -n "$seed_file_base" ]; then normalize_seed_base "$seed_file_base" file "$seed_label"; return 0; fi; \
      return 1; \
    }; \
    read_cmdline_seed_refs() { \
      CMDLINE_SEED_URL_BASE=""; CMDLINE_SEED_FILE_BASE=""; \
      [ -r /proc/cmdline ] || return 0; \
      cmdline=$(cat /proc/cmdline); \
      for arg in $cmdline; do \
        case "$arg" in \
          preseed/url=*|url=*) [ -n "$CMDLINE_SEED_URL_BASE" ] || CMDLINE_SEED_URL_BASE=${arg#*=} ;; \
          preseed/file=*|file=*) [ -n "$CMDLINE_SEED_FILE_BASE" ] || CMDLINE_SEED_FILE_BASE=${arg#*=} ;; \
        esac; \
      done; \
    }; \
    read_cmdline_seed_refs; \
    PERSISTED_SEED_URL_BASE=""; PERSISTED_SEED_FILE_BASE=""; \
    if [ -f "$SEED_URL_PATH" ]; then PERSISTED_SEED_URL_BASE=$(cat "$SEED_URL_PATH"); fi; \
    if [ -f "$SEED_FILE_PATH" ]; then PERSISTED_SEED_FILE_BASE=$(cat "$SEED_FILE_PATH"); fi; \
    if SEED_BASE=$(choose_seed_base "$CMDLINE_SEED_URL_BASE" "$CMDLINE_SEED_FILE_BASE" "kernel cmdline"); then \
      :; \
    elif SEED_BASE=$(choose_seed_base "$PERSISTED_SEED_URL_BASE" "$PERSISTED_SEED_FILE_BASE" "persisted installer state"); then \
      :; \
    else \
      echo "fatal: installation URL or file path not found for include_command; use url=, preseed/url=, file=, or preseed/file=" >&2; exit 1; \
    fi; \
    case "$SEED_BASE" in \
      /*) \
        printf "%s\n" "$SEED_BASE" >"$SEED_FILE_PATH"; rm -f "$SEED_URL_PATH"; \
        cp "$SEED_BASE/scripts/preseed/bootstrap-entry.sh" "$HELPER"; \
        ;; \
      *) \
        printf "%s\n" "$SEED_BASE" >"$SEED_URL_PATH"; rm -f "$SEED_FILE_PATH"; \
        wget --no-verbose --tries=3 --timeout=45 -O "$HELPER" "$SEED_BASE/scripts/preseed/bootstrap-entry.sh"; \
        ;; \
    esac; \
    [ -s "$HELPER" ] || { echo "fatal: fetched bootstrap entry helper is empty: scripts/preseed/bootstrap-entry.sh" >&2; exit 1; }; \
    chmod 0700 "$HELPER"; \
    "$HELPER" prepare-context "$LOG_DIR/02-preseed.log" "$SEED_BASE"'

##########  Delivery Helpers  ##########
d-i preseed/run string \
  scripts/preseed/apply.sh

d-i preseed/early_command string \
  /bin/sh -c 'set -eu; RUNTIME_DIR=/tmp/install-runtime; BOOTSTRAP_DIR=$RUNTIME_DIR/bootstrap; LOG_DIR=/tmp/preseed-logs; HELPER=$BOOTSTRAP_DIR/preseed-bootstrap-entry.sh; mkdir -p "$BOOTSTRAP_DIR"; [ -x "$HELPER" ] || { echo "fatal: staged bootstrap helper is missing before early_command: $HELPER" >&2; exit 1; }; exec "$HELPER" early "$LOG_DIR/02-preseed.log"'

d-i partman/early_command string \
  /bin/sh -c 'set -eu; RUNTIME_DIR=/tmp/install-runtime; BOOTSTRAP_DIR=$RUNTIME_DIR/bootstrap; LOG_DIR=/tmp/preseed-logs; HELPER=$BOOTSTRAP_DIR/preseed-bootstrap-entry.sh; mkdir -p "$BOOTSTRAP_DIR"; [ -x "$HELPER" ] || { echo "fatal: staged bootstrap helper is missing before partman/early_command: $HELPER" >&2; exit 1; }; exec "$HELPER" partman "$LOG_DIR/05-partman.log"'

d-i preseed/late_command string \
  /bin/sh -c 'set -eu; RUNTIME_DIR=/tmp/install-runtime; BOOTSTRAP_DIR=$RUNTIME_DIR/bootstrap; LOG_DIR=/tmp/preseed-logs; HELPER=$BOOTSTRAP_DIR/preseed-bootstrap-entry.sh; mkdir -p "$BOOTSTRAP_DIR"; [ -x "$HELPER" ] || { echo "fatal: staged bootstrap helper is missing before late_command: $HELPER" >&2; exit 1; }; exec "$HELPER" late "$LOG_DIR/09-late.log"'
