##########  Mirror / APT defaults  ##########
d-i debian-installer/allow_unauthenticated boolean false
d-i debian-installer/allow_unauthenticated_ssl boolean false
d-i mirror/country string manual
d-i mirror/protocol select https
d-i mirror/codename string trixie
d-i mirror/suite string trixie
d-i mirror/udeb/suite string trixie
d-i mirror/https/countries select manual
d-i mirror/https/hostname string deb.debian.org
d-i mirror/https/mirror select deb.debian.org
d-i mirror/https/directory string /debian/
d-i mirror/https/proxy string
d-i apt-setup/use_mirror boolean true
d-i apt-setup/disable-cdrom-entries boolean true
d-i apt-setup/no_mirror boolean false
d-i apt-setup/services-select multiselect security, updates, backports
d-i apt-setup/security_host string security.debian.org
d-i apt-setup/security_path string /debian-security
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/backports boolean true

##########  Inofficial APT Archives  ##########
# Debian Sid (Unstable)
d-i apt-setup/local0/repository string https://deb.debian.org/debian sid main contrib non-free non-free-firmware
d-i apt-setup/local0/comment string Debian Sid (Unstable)
d-i apt-setup/local0/key string https://ftp-master.debian.org/keys/archive-key-13.asc
d-i apt-setup/local0/source boolean true

# Debian Forky (Testing)
d-i apt-setup/local1/repository string https://deb.debian.org/debian forky main contrib non-free non-free-firmware
d-i apt-setup/local1/comment string Debian Forky (Testing)
d-i apt-setup/local1/key string https://ftp-master.debian.org/keys/archive-key-13.asc
d-i apt-setup/local1/source boolean true

# Debian XanMod Kernel
d-i apt-setup/local2/repository string https://deb.xanmod.org trixie main
d-i apt-setup/local2/comment string XanMod kernel archive
d-i apt-setup/local2/key string https://dl.xanmod.org/archive.key
d-i apt-setup/local2/source boolean false

##########  Package selection defaults  ##########
d-i base-installer/install-recommends boolean false
d-i base-installer/excludes string dbus dbus-daemon dbus-x11 x11-common xserver-xorg xserver-xorg-core xserver-xorg-video-amdgpu
popularity-contest popularity-contest/participate boolean false
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/run_tasksel seen true
d-i pkgsel/install-recommends boolean false
d-i pkgsel/upgrade select safe-upgrade
d-i pkgsel/update-policy select unattended-upgrades
d-i pkgsel/include string btrfs-progs xfsprogs dosfstools lz4 inotify-tools sudo ca-certificates bash-completion perl gpg git wget curl unzip tar p7zip make cryptsetup efibootmgr mokutil sbsigntool openssl kmod util-linux util-linux-extra ifupdown network-manager wpasupplicant wireless-regdb ethtool xz-utils zstd nftables fonts-dejavu-core python3 python3-yaml dbus-broker dbus-user-session dbus-bin dbus-system-bus-common dbus-session-bus-common udisks2 polkitd unattended-upgrades tpm2-tools tpm-udev firmware-linux-free firmware-linux-nonfree firmware-misc-nonfree firmware-realtek firmware-iwlwifi firmware-atheros firmware-brcm80211 firmware-sof-signed
