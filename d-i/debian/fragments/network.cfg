##########  Bootstrap identity defaults  ##########
# Runtime-generated answers replace these placeholders once classes are parsed.
d-i netcfg/get_hostname string temphost
d-i netcfg/get_domain string lan.icramer.com
d-i netcfg/hostname string temphost

##########  Networking defaults  ##########
d-i netcfg/enable boolean true
d-i netcfg/choose_interface select auto
d-i netcfg/use_autoconfig boolean true
d-i netcfg/dhcp_timeout string 60
d-i netcfg/dhcpv6_timeout string 15
d-i netcfg/link_wait_timeout string 10
d-i netcfg/dhcp_hostname string
d-i netcfg/target_network_config select ifupdown
d-i netcfg/wireless_wep string
