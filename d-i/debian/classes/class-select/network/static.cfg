# Static network profile. Address, gateway, nameserver, and domain values are
# appended later from netcfg/* kernel parameters by scripts/preseed/answers.sh.
d-i netcfg/enable boolean true
d-i netcfg/enable seen true
d-i netcfg/use_autoconfig boolean false
d-i netcfg/use_autoconfig seen true
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/disable_autoconfig seen true
d-i netcfg/disable_dhcp boolean true
d-i netcfg/disable_dhcp seen true
d-i netcfg/dhcp_options select Configure network manually
d-i netcfg/dhcp_options seen true
d-i netcfg/confirm_static boolean true
d-i netcfg/confirm_static seen true
d-i netcfg/target_network_config select ifupdown
d-i netcfg/target_network_config seen true
d-i netcfg/link_wait_timeout string 10
d-i netcfg/link_wait_timeout seen true
