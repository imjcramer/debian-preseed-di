Type: class
Group: disk
Name: nvme
Description: bare-metal Btrfs/XFS storage family
HostProfilePrefix: btrfs
HostFamily: btrfs
HookFamily: btrfs
InstallDiskCandidates: /dev/nvme0n1, /dev/nvme*n*, /dev/sd*
DefaultInstallDisk: /dev/nvme0n1

Type: class
Group: disk
Name: emmc
Description: eMMC F2FS storage family
HostProfilePrefix: f2fs
HostFamily: f2fs
HookFamily: f2fs
InstallDiskCandidates: /dev/mmcblk0, /dev/mmcblk*
DefaultInstallDisk: /dev/mmcblk0

Type: class
Group: disk
Name: vm
Description: VM Btrfs/XFS storage family
HostProfilePrefix: vm
HostFamily: vm
HookFamily: vm
InstallDiskCandidates: /dev/nvme0n1, /dev/nvme*n*, /dev/vd*, /dev/sd*, /dev/mmcblk*
DefaultInstallDisk: /dev/vda
