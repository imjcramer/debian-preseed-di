# Canonical installer class metadata source list.
#
# Runtime generation normalizes the listed cfg files into:
# - state/plan.tsv for installer consumption
# - cache/classes.state.conf for debug-friendly section/key inspection
#
# Record format in classes/configs/*.cfg:
# - blank lines terminate records
# - comments start with '#'
# - fields use 'Field: value'
#
# List-valued rule fields accept comma- or space-separated tokens and normalize
# to single-space word lists in the generated plan:
# - InstallDiskCandidates
# - AllowedHardwareClasses
# - RejectedClasses
# - RequiresClasses
# - DebianAptPreferences

ManifestVersion: 5
ClassTokenFormats: bare, group/class, group:class, group.class
Config: classes/configs/groups.cfg
Config: classes/configs/hardware.cfg
Config: classes/configs/system.cfg
Config: classes/configs/storage.cfg
Config: classes/configs/addons.cfg
