# WPA Wi-Fi install profile. ESSID, WPA passphrase, and static IPv4 values are
# appended later from netcfg/* kernel parameters by scripts/preseed/answers.sh.
d-i netcfg/enable boolean true
d-i netcfg/enable seen true
d-i netcfg/choose_interface select auto
d-i netcfg/choose_interface seen true
d-i netcfg/wireless_show_essids select Enter ESSID manually
d-i netcfg/wireless_show_essids seen true
d-i netcfg/wireless_adhoc_managed select Infrastructure (Managed) network
d-i netcfg/wireless_adhoc_managed seen true
d-i netcfg/wireless_security_type select wpa
d-i netcfg/wireless_security_type seen true
d-i netcfg/wireless_wep string
d-i netcfg/wireless_wep seen true
d-i netcfg/wireless_essid seen false
d-i netcfg/wireless_essid_again seen false
d-i netcfg/wireless_wpa seen false
d-i netcfg/use_autoconfig boolean false
d-i netcfg/use_autoconfig seen true
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/disable_autoconfig seen true
d-i netcfg/disable_dhcp boolean true
d-i netcfg/disable_dhcp seen true
d-i netcfg/dhcp_options select Configure network manually
d-i netcfg/dhcp_options seen true
d-i netcfg/confirm_static boolean true
d-i netcfg/confirm_static seen true
d-i netcfg/target_network_config select ifupdown
d-i netcfg/target_network_config seen true
d-i netcfg/link_wait_timeout string 10
d-i netcfg/link_wait_timeout seen true
d-i hw-detect/load_firmware boolean true
d-i hw-detect/load_firmware seen true
