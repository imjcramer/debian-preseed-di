# Reused-ESP dual-boot install profile.
# Select with classes=...,dualboot and pass dualboot_efi=<n> plus
# dualboot_debian=<n> on the installer kernel command line.
d-i pkgsel/include string os-prober
d-i pkgsel/include seen true
d-i grub-installer/only_debian boolean false
d-i grub-installer/only_debian seen true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/with_other_os seen true
d-i grub-installer/enable_os_prober_otheros_yes boolean true
d-i grub-installer/enable_os_prober_otheros_yes seen true
d-i grub-installer/enable_os_prober_otheros_no boolean false
d-i grub-installer/enable_os_prober_otheros_no seen true
