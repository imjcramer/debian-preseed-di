# VM installs use the regular partman flow only and keep Btrfs maintenance
# package ownership in pkgsel instead of late_command.
# This also owns the VM guest hardware baseline.
d-i base-installer/kernel/override-image string linux-xanmod-x64v2
d-i base-installer/kernel/override-image seen true
d-i anna/choose_modules multiselect partman-btrfs partman-xfs
d-i anna/choose_modules seen true
d-i partman-auto/method string regular
d-i partman-auto/method seen true
d-i pkgsel/include string qemu-guest-agent linux-xanmod-x64v2 btrfsmaintenance
d-i pkgsel/include seen true
