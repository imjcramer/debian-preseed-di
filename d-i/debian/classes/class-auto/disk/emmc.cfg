# eMMC installs use the F2FS partman family with explicit F2FS tooling.
# This also owns the old thin-host hardware baseline.
d-i hw-detect/load_firmware boolean true
d-i hw-detect/load_firmware seen true
d-i base-installer/kernel/override-image string linux-xanmod-x64v2
d-i base-installer/kernel/override-image seen true
d-i anna/choose_modules multiselect partman-f2fs
d-i anna/choose_modules seen true
d-i partman-auto/method string regular
d-i partman-auto/method seen true
d-i pkgsel/include string linux-xanmod-x64v2 f2fs-tools
d-i pkgsel/include seen true
