# NVMe installs use the Btrfs/XFS partman family, keep NVMe management tools,
# and preinstall Btrfs maintenance through pkgsel instead of late_command.
# This also owns the old bare-metal hardware baseline.
d-i hw-detect/load_firmware boolean true
d-i hw-detect/load_firmware seen true
d-i base-installer/kernel/override-image string linux-xanmod-x64v3
d-i base-installer/kernel/override-image seen true
d-i anna/choose_modules multiselect partman-btrfs partman-xfs
d-i anna/choose_modules seen true
d-i partman-auto/method string regular
d-i partman-auto/method seen true
d-i pkgsel/include string smartmontools linux-xanmod-x64v3 nvme-cli btrfsmaintenance
d-i pkgsel/include seen true
