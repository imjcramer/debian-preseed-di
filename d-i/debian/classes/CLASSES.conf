# Installer class groups and deterministic class ordering.
#
# Class roots:
# - classes/class-auto/<group>/<class>.cfg is hardware-detected by default.
# - classes/class-select/<group>/<class>.cfg is selected manually in classes=.
# - classes/class-addon/<class>.cfg is an optional additive class selected
#   manually as a bare token such as "nvidia" or as "addon/nvidia".
#
# Token formats:
# - bare class names such as "desktop" resolve through this manifest and must be
#   unique across manifest-declared classes.
# - group-qualified tokens such as "role/desktop", "role:desktop", or
#   "role.desktop" resolve directly to the matching class root.
# - addon bare tokens may point at classes/class-addon/<token>.cfg without a
#   manifest class record.
#
# Keep package selection in the class fragments themselves through pkgsel/include.
# This manifest describes class resolution and shared storage dispatch only.

[manifest]
version=5
class_token_formats=bare group/class group:class group.class

[group.site]
required=true
order=10
purpose=site
source=class-select
description=site and timezone defaults

[group.role]
required=true
order=20
purpose=host-variant
source=class-select
description=target host variant

[group.service]
required=false
order=30
purpose=service
source=class-select
description=optional service roles

[group.arch]
required=true
order=40
purpose=arch
source=class-auto
description=auto-detected architecture, kernel, and boot-chain package fragment

[group.cpu]
required=true
order=50
purpose=cpu
source=class-auto
description=auto-detected CPU vendor tuning and microcode

[group.gpu]
required=true
multi=true
order=60
purpose=gpu
source=class-auto
description=auto-detected graphics and firmware baseline; NVIDIA is an addon

[group.security]
required=true
order=70
purpose=security
source=class-select
description=security baseline

[group.network]
required=true
order=80
purpose=network
source=class-select
description=network configuration mode

[group.disk]
required=true
order=90
purpose=storage
source=class-auto
description=auto-detected storage family and host profile derivation

[group.debug]
required=false
order=100
purpose=debug
source=class-select
description=optional installer diagnostics

[group.addon]
required=false
multi=true
order=110
purpose=addon
source=class-addon
description=operator-provided additive class fragments

[class.role.desktop]
description=desktop baseline
host_variant=desktop

[class.role.server]
description=server baseline
host_variant=server

[class.site.dmz]
description=DMZ site defaults

[class.site.lab]
description=lab site defaults

[class.site.prod]
description=production site defaults

[class.service.web]
description=web service role
late_helper=web

[class.service.db]
description=database service role
late_helper=db

[class.service.gitlab-runner]
description=GitLab Runner service role

[class.arch.amd64]
description=amd64 kernel and signed EFI boot chain

[class.arch.arm64]
description=arm64 kernel and EFI boot chain

[class.cpu.amd]
description=AMD CPU microcode

[class.cpu.intel]
description=Intel CPU microcode

[class.gpu.amd-radeon]
description=AMD Radeon graphics

[class.gpu.intel-uhd]
description=Intel integrated graphics

[class.gpu.generic]
description=generic graphics or headless target with no vendor-specific firmware baseline

[class.security.enhanced]
description=enhanced security baseline
late_helper=enhanced

[class.security.standard]
description=standard security baseline
late_helper=standard

[class.network.dhcp]
description=DHCP networking

[class.network.static]
description=static networking from kernel cmdline

[class.disk.nvme]
description=bare-metal Btrfs/XFS storage family
host_profile_prefix=btrfs
host_family=btrfs
hook_family=btrfs
install_disk_candidates=/dev/nvme0n1 /dev/nvme*n* /dev/sd*
default_install_disk=/dev/nvme0n1

[class.disk.emmc]
description=eMMC F2FS storage family
host_profile_prefix=f2fs
host_family=f2fs
hook_family=f2fs
install_disk_candidates=/dev/mmcblk0 /dev/mmcblk*
default_install_disk=/dev/mmcblk0

[class.disk.vm]
description=VM Btrfs/XFS storage family
host_profile_prefix=vm
host_family=vm
hook_family=vm
install_disk_candidates=/dev/nvme0n1 /dev/nvme*n* /dev/vd* /dev/sd* /dev/mmcblk*
default_install_disk=/dev/vda

[class.debug.debug]
description=installer debug helpers
early_helper=debug
partman_helper=debug

[class.addon.ssh]
description=hardened OpenSSH server bootstrap

[class.addon.nvidia]
description=opt-in NVIDIA proprietary driver and firmware bootstrap

[class.addon.wifi]
description=WPA Wi-Fi bootstrap with static netcfg cmdline answers

[class.addon.forky]
description=opt-in Debian forky installer suite and XanMod archive bootstrap
debian_apt_preferences=trixie sid dbus

[class.addon.devops]
description=opt-in development toolchain and /pool-backed build/cache policy
late_helper=devops

[class.addon.podman]
description=opt-in rootless Podman and Buildah runtime policy

[class.addon.dualboot]
description=opt-in reused-ESP dual-boot install path
allowed_hardware_classes=disk/nvme disk/vm

[class.addon.timeshift]
description=opt-in Timeshift Btrfs snapshots with managed GRUB snapshot integration
allowed_hardware_classes=disk/nvme disk/vm
