# Managed by debian-preseed-di.
#
# The installer provisions managed infrastructure hosts, not Wi-Fi Direct/P2P
# peers. Disabling P2P prevents wpa_supplicant from exporting unstable
# P2PDevice D-Bus properties while preserving normal WPA/SAE station use.

ctrl_interface=DIR=/run/wpa_supplicant GROUP=netdev
update_config=0
p2p_disabled=1
