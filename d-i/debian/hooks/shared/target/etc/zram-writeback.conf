[zram]
device = __ZRAM_SWAP_DEVICE__
device_name = __ZRAM_SWAP_DEVICE_NAME__
algorithm = __ZRAM_COMPRESSION_ALGORITHM__
algorithm_params = __ZRAM_ALGORITHM_PARAMS__
disksize =
size_percent = __ZRAM_PCT__
size_min_mib = __ZRAM_MIN_MIB__
size_max_mib = __ZRAM_MAX_MIB__
mem_limit =
mem_limit_percent = __ZRAM_MEM_LIMIT_PCT__
max_comp_streams = __ZRAM_MAX_COMP_STREAMS__
swap_priority = __ZRAM_SWAP_PRIORITY__

[writeback]
enabled = __ZRAM_WRITEBACK_ENABLE__
backing_dev = __ZRAM_BACKING_DEVICE__
raw_backing_dev = __ZRAM_BACKING_RAW_DEVICE__
backing_mapper = __ZRAM_BACKING_MAPPER_NAME__
hot_age_seconds = __ZRAM_HOT_AGE_SEC__
idle_age_seconds = __ZRAM_IDLE_AGE_SEC__
pressure_idle_age_seconds = __ZRAM_PRESSURE_IDLE_AGE_SEC__
emergency_idle_age_seconds = __ZRAM_EMERGENCY_IDLE_AGE_SEC__
compressed_writeback = __ZRAM_COMPRESSED_WRITEBACK__
writeback_batch_size = __ZRAM_WRITEBACK_BATCH_SIZE__
writeback_limit_enabled = __ZRAM_WRITEBACK_LIMIT_ENABLE__
writeback_limit_percent = __ZRAM_WRITEBACK_LIMIT_PCT__
daily_writeback_limit = __ZRAM_DAILY_WRITEBACK_LIMIT__
# Linux 7.0+ accepts mixed page_index/page_indexes LOW-HIGH tokens per call.
maintenance_page_indexes = __ZRAM_MAINTENANCE_PAGE_INDEXES__

[backing_crypto]
cipher = __DMCRYPT_EPHEMERAL_CIPHER__
key_size_bits = __DMCRYPT_EPHEMERAL_KEY_SIZE__
hash = __DMCRYPT_EPHEMERAL_HASH__
random_key_file = __DMCRYPT_RANDOM_KEY_FILE__

[recompression]
# The active policy configures three secondary tiers:
# tier 1 = idle pages with lzo-rle, tier 2 = huge idle pages with zstd,
# tier 3 = huge non-idle pages with a smaller pressure/emergency budget.
enabled = __ZRAM_COLD_TIER_RECOMPRESS_ENABLE__
compact_after_actions = __ZRAM_COLD_TIER_COMPACT_ENABLE__

[recompression_tier1]
enabled = __ZRAM_TIER1_ENABLE__
type = idle
algorithm = __ZRAM_TIER1_ALGORITHM__
priority = __ZRAM_TIER1_PRIORITY__
level = __ZRAM_TIER1_LEVEL__
threshold_bytes = __ZRAM_TIER1_THRESHOLD_BYTES__
max_pages_normal = __ZRAM_TIER1_MAX_PAGES_NORMAL__
max_pages_pressure = __ZRAM_TIER1_MAX_PAGES_PRESSURE__
max_pages_emergency = __ZRAM_TIER1_MAX_PAGES_EMERGENCY__

[recompression_tier2]
enabled = __ZRAM_TIER2_ENABLE__
type = huge_idle
algorithm = __ZRAM_TIER2_ALGORITHM__
priority = __ZRAM_TIER2_PRIORITY__
level = __ZRAM_TIER2_LEVEL__
threshold_bytes = __ZRAM_TIER2_THRESHOLD_BYTES__
max_pages_normal = __ZRAM_TIER2_MAX_PAGES_NORMAL__
max_pages_pressure = __ZRAM_TIER2_MAX_PAGES_PRESSURE__
max_pages_emergency = __ZRAM_TIER2_MAX_PAGES_EMERGENCY__

[recompression_tier3]
enabled = __ZRAM_TIER3_ENABLE__
type = huge
algorithm = __ZRAM_TIER3_ALGORITHM__
priority = __ZRAM_TIER3_PRIORITY__
level = __ZRAM_TIER3_LEVEL__
threshold_bytes = __ZRAM_TIER3_THRESHOLD_BYTES__
max_pages_normal = __ZRAM_TIER3_MAX_PAGES_NORMAL__
max_pages_pressure = __ZRAM_TIER3_MAX_PAGES_PRESSURE__
max_pages_emergency = __ZRAM_TIER3_MAX_PAGES_EMERGENCY__

[cold_tier]
# Page minimums are real positive trigger counts. Use the top-level writeback
# gate to disable cold-tier writeback instead of setting a minimum to zero.
enabled = __ZRAM_COLD_TIER_ENABLE__
writeback_enabled = __ZRAM_COLD_TIER_WRITEBACK_ENABLE__
min_zram_fill_percent = __ZRAM_COLD_TIER_MIN_ZRAM_FILL_PCT__
min_cold_pages = __ZRAM_COLD_TIER_MIN_COLD_PAGES__
min_idle_pages = __ZRAM_COLD_TIER_MIN_IDLE_PAGES__
min_huge_idle_pages = __ZRAM_COLD_TIER_MIN_HUGE_IDLE_PAGES__
min_huge_pages = __ZRAM_COLD_TIER_MIN_HUGE_PAGES__
min_incompressible_pages = __ZRAM_COLD_TIER_MIN_INCOMPRESSIBLE_PAGES__
recompress_idle_max_pages = __ZRAM_COLD_TIER_RECOMPRESS_IDLE_MAX_PAGES__
recompress_huge_idle_max_pages = __ZRAM_COLD_TIER_RECOMPRESS_HUGE_IDLE_MAX_PAGES__
recompress_huge_max_pages = __ZRAM_COLD_TIER_RECOMPRESS_HUGE_MAX_PAGES__
writeback_incompressible_max_pages = __ZRAM_COLD_TIER_WRITEBACK_INCOMPRESSIBLE_MAX_PAGES__
writeback_spec_chunk_page_limit = __ZRAM_COLD_TIER_WRITEBACK_SPEC_CHUNK_PAGE_LIMIT__

[policy]
idle_writeback_enabled = __ZRAM_IDLE_WRITEBACK_ENABLE__
pressure_enabled = __ZRAM_PRESSURE_ENABLE__
pressure_mem_available_percent = __ZRAM_PRESSURE_MEM_AVAILABLE_PCT__
emergency_mem_available_percent = __ZRAM_EMERGENCY_MEM_AVAILABLE_PCT__
memory_some_avg10_min = __ZRAM_PRESSURE_SOME_AVG10_THRESHOLD__
memory_full_avg10_min = __ZRAM_PRESSURE_FULL_AVG10_THRESHOLD__
emergency_some_avg10_min = __ZRAM_EMERGENCY_SOME_AVG10_THRESHOLD__
emergency_full_avg10_min = __ZRAM_EMERGENCY_FULL_AVG10_THRESHOLD__
min_free_memory = __ZRAM_MIN_FREE_MEMORY__
writeback_min_remaining_pages = __ZRAM_WRITEBACK_MIN_REMAINING_PAGES__

[daemon]
# Foreground systemd daemon for PSI-triggered pressure and emergency passes.
# Normal idle/cold-tier maintenance remains timer-driven.
enabled = __ZRAM_DAEMON_ENABLE__
psi_window_us = __ZRAM_DAEMON_PSI_WINDOW_US__
psi_some_stall_us = __ZRAM_DAEMON_PSI_SOME_STALL_US__
psi_full_stall_us = __ZRAM_DAEMON_PSI_FULL_STALL_US__
poll_timeout_seconds = __ZRAM_DAEMON_POLL_TIMEOUT_SEC__
pressure_cooldown_seconds = __ZRAM_DAEMON_PRESSURE_COOLDOWN_SEC__
emergency_cooldown_seconds = __ZRAM_DAEMON_EMERGENCY_COOLDOWN_SEC__
recovery_hysteresis_seconds = __ZRAM_DAEMON_RECOVERY_HYSTERESIS_SEC__

[paths]
sysfs_root = /sys
debugfs_root = /sys/kernel/debug
procfs_root = /proc
runtime_dir = /run/zram

[runtime]
lock_file = __ZRAM_LOCK_FILE__
metrics_file =
log_level = __ZRAM_LOG_LEVEL__
dry_run = 0
