# Managed by debian-preseed-di.
#
# The static preseed handoff owns these generated ifupdown adapters.
# NetworkManager stays available for the desktop but must not race ifupdown or
# activate a parallel supplicant path for these deterministic boot interfaces.

[keyfile]
unmanaged-devices=interface-name:__INSTALLER_PRESEED_NETWORK_ETHERNET_IFACE__;interface-name:__INSTALLER_PRESEED_NETWORK_WIFI_IFACE__
