# /etc/sysctl.d/profiles/performance/40-performance.conf
# Performance profile: higher throughput without dropping the core security floor.

# Kernel diagnostics, crash surfaces, and information exposure.
kernel.printk = 4 4 1 4
kernel.nmi_watchdog = 0
kernel.sysrq = 0
kernel.randomize_va_space = 2
kernel.kexec_load_disabled = 1
kernel.kptr_restrict = 1
kernel.dmesg_restrict = 1
kernel.yama.ptrace_scope = 1
kernel.perf_event_paranoid = 1
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 1

# Filesystem and terminal hardening.
fs.suid_dumpable = 0
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2
dev.tty.ldisc_autoload = 0
dev.tty.legacy_tiocsti = 0

# Keep namespaces available for container-heavy and build-heavy profiles.
kernel.unprivileged_userns_clone = 1
user.max_user_namespaces = 65535

# IPv4 routing, spoofing, and redirect controls.
net.ipv4.ip_forward = 0
net.ipv4.conf.all.forwarding = 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.all.bootp_relay = 0
net.ipv4.conf.default.bootp_relay = 0
net.ipv4.conf.all.proxy_arp = 0
net.ipv4.conf.default.proxy_arp = 0
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.default.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.default.arp_announce = 2

# IPv4 TCP safety defaults.
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_syn_retries = 4
net.ipv4.tcp_synack_retries = 4
net.ipv4.tcp_rfc1337 = 1
net.ipv4.ping_group_range = 0 2147483647
net.ipv4.ip_unprivileged_port_start = 1025

# IPv6 redirect/source-route controls; privacy addresses are disabled for stable flows.
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
net.ipv6.conf.all.use_tempaddr = 0
net.ipv6.conf.default.use_tempaddr = 0

# Bridge traffic should stay visible to nftables/iptables policy.
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.bridge.bridge-nf-call-arptables = 1
