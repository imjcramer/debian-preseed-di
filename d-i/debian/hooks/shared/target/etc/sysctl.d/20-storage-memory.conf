# Favor compressed swap first, then spill cold pages to the raw NVMe writeback tier.
vm.swappiness = 180
vm.page-cluster = 0
vm.vfs_cache_pressure = 75
vm.vfs_cache_pressure_denom = 100
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125
# Keep higher-order allocations available for tmpfs/shmem THP and zram-backed
# memory without pushing background compaction to the kernel's extremes.
vm.compaction_proactiveness = 40
vm.extfrag_threshold = 500
# Keep byte caps as the active dirty-writeback policy on large-RAM hosts.
vm.dirty_background_bytes = 67108864
vm.dirty_bytes = 268435456
vm.dirty_expire_centisecs = 1500
vm.dirty_writeback_centisecs = 250
vm.stat_interval = 10

# Support the tmpfiles watcher and high-churn storage consumers.
fs.aio-max-nr = 1048576
fs.inotify.max_user_instances = 1024
fs.inotify.max_user_watches = 524288
fs.inotify.max_queued_events = 65536

# Keep link/path protections enabled regardless of storage profile.
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2
