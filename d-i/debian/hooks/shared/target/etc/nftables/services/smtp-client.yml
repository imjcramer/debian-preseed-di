apiVersion: cybops.nftables/v1
kind: NftablesServiceOverlay
metadata:
  name: smtp-client
  description: Outbound SMTP submission/client overlay.
  merge_priority: 50
egress:
  rules:
    smtp_submission:
      enabled: true
      protocols:
      - tcp
      ports:
      - 25
      - 465
      - 587
      allow_to:
        ipv4:
        - 0.0.0.0/0
        ipv6:
        - ::/0
