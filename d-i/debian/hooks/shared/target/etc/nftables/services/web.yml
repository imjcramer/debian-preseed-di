apiVersion: cybops.nftables/v1
kind: NftablesServiceOverlay
metadata:
  name: web
  description: Public HTTP/HTTPS web server overlay.
  merge_priority: 50
services:
  web_server:
    enabled: true
    direction: inbound
    protocols:
    - tcp
    ports:
    - 80
    - 443
    allow:
      ipv4:
      - 0.0.0.0/0
      ipv6:
      - ::/0
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
    rate_limit: 1000/second burst 2000 packets
    log: false
egress:
  rules:
    web_egress_updates:
      enabled: true
      protocols:
      - tcp
      ports:
      - 80
      - 443
      allow_to:
        ipv4:
        - 0.0.0.0/0
        ipv6:
        - ::/0
