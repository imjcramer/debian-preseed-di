apiVersion: cybops.nftables/v1
kind: NftablesServiceOverlay
metadata:
  name: dhcp-client
  description: DHCP client overlay for workstation/server address assignment.
  merge_priority: 50
services:
  dhcp_client_v4:
    enabled: true
    direction: inbound
    protocols:
    - udp
    ports:
    - 68
    allow:
      ipv4:
      - 0.0.0.0/0
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
  dhcp_client_v6:
    enabled: true
    direction: inbound
    protocols:
    - udp
    ports:
    - 546
    allow:
      ipv6:
      - ::/0
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
egress:
  rules:
    dhcp_client_v4_out:
      enabled: true
      protocols:
      - udp
      ports:
      - 67
      allow_to:
        ipv4:
        - 0.0.0.0/0
    dhcp_client_v6_out:
      enabled: true
      protocols:
      - udp
      ports:
      - 547
      allow_to:
        ipv6:
        - ::/0
