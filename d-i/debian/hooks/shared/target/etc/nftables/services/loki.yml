apiVersion: cybops.nftables/v1
kind: NftablesServiceOverlay
metadata:
  name: loki
  description: Grafana Loki overlay.
  merge_priority: 50
services:
  loki_http:
    enabled: true
    direction: inbound
    protocols:
    - tcp
    ports:
    - 3100
    allow:
      ipv4:
      - 10.0.0.0/8
      - 192.168.0.0/16
      - 10.8.0.0/24
      ipv6:
      - fc00::/7
      - fd00:8::/64
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
      - wg0
    sensitive: true
  loki_grpc:
    enabled: false
    direction: inbound
    protocols:
    - tcp
    ports:
    - 9095
    allow:
      ipv4:
      - 10.0.0.0/8
      - 192.168.0.0/16
      ipv6:
      - fc00::/7
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
      - wg0
    sensitive: true
