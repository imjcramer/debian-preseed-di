apiVersion: cybops.nftables/v1
kind: NftablesServiceOverlay
metadata:
  name: openvpn
  description: OpenVPN server/client overlay.
  merge_priority: 50
services:
  openvpn:
    enabled: true
    direction: inbound
    protocols:
    - udp
    ports:
    - 1194
    allow:
      ipv4:
      - 0.0.0.0/0
      ipv6:
      - ::/0
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
    rate_limit: 100/second burst 200 packets
    log: false
