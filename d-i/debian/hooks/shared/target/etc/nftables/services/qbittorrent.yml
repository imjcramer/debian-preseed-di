apiVersion: cybops.nftables/v1
kind: NftablesServiceOverlay
metadata:
  name: qbittorrent
  description: qBittorrent private-tracker friendly overlay. Set a fixed peer port and tracker CIDRs.
  merge_priority: 50
services:
  qbittorrent_incoming:
    enabled: true
    direction: inbound
    protocols:
    - tcp
    - udp
    ports:
    - 51413
    allow:
      ipv4:
      - 0.0.0.0/0
      ipv6:
      - ::/0
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
      - wg0
    rate_limit: 300/second burst 600 packets
    log: false
egress:
  rules:
    qbittorrent_tracker_tcp:
      enabled: true
      protocols:
      - tcp
      ports:
      - 80
      - 443
      - 2710
      - 6969
      allow_to:
        ipv4:
        - 0.0.0.0/0
        ipv6:
        - ::/0
      log: false
    qbittorrent_tracker_udp:
      enabled: true
      protocols:
      - udp
      ports:
      - 6969
      - 2710
      - 1337
      allow_to:
        ipv4:
        - 0.0.0.0/0
        ipv6:
        - ::/0
      log: false
