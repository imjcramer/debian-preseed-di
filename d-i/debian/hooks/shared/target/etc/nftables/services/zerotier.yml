apiVersion: cybops.nftables/v1
kind: NftablesServiceOverlay
metadata:
  name: zerotier
  description: ZeroTier overlay.
  merge_priority: 50
services:
  zerotier_udp:
    enabled: true
    direction: inbound
    protocols:
    - udp
    ports:
    - 9993
    allow:
      ipv4:
      - 0.0.0.0/0
      ipv6:
      - ::/0
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
egress:
  rules:
    zerotier_out:
      enabled: true
      protocols:
      - udp
      ports:
      - 9993
      allow_to:
        ipv4:
        - 0.0.0.0/0
        ipv6:
        - ::/0
