apiVersion: cybops.nftables/v1
kind: NftablesServiceOverlay
metadata:
  name: grafana
  description: Grafana web UI overlay.
  merge_priority: 50
services:
  grafana:
    enabled: true
    direction: inbound
    protocols:
    - tcp
    ports:
    - 3000
    allow:
      ipv4:
      - 10.8.0.0/24
      ipv6:
      - fd00:8::/64
      interfaces:
      - eth0
      - en*
      - wlan0
      - wl*
      - wg0
    sensitive: true
