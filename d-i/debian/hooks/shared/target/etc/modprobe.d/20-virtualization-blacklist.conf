# VirtualBox guest side
blacklist vboxguest
install  vboxguest /bin/false

blacklist vboxsf
install  vboxsf    /bin/false

blacklist vboxvideo
install  vboxvideo /bin/false

# Hyper-V guest bits (only needed when running as Hyper-V guest)
blacklist hv_vmbus
install  hv_vmbus  /bin/false

blacklist hv_netvsc
install  hv_netvsc /bin/false

blacklist hv_storvsc
install  hv_storvsc /bin/false

# VMware guest drivers (only when running as VMware guest)
blacklist vmwgfx
install  vmwgfx    /bin/false

blacklist vmxnet3
install  vmxnet3   /bin/false

blacklist vmw_pvscsi
install  vmw_pvscsi /bin/false
