# Floppy / very old serial line stuff
blacklist floppy
install  floppy /bin/false

blacklist n_hdlc
install  n_hdlc /bin/false

# Old laptop / expansion standards
blacklist pcmcia
install  pcmcia /bin/false

blacklist yenta_socket
install  yenta_socket /bin/false

blacklist tifm_7xx1
install  tifm_7xx1 /bin/false

blacklist tifm_core
install  tifm_core /bin/false

# FireWire (IEEE1394)
blacklist firewire-core
install  firewire-core /bin/false

blacklist firewire-ohci
install  firewire-ohci /bin/false

blacklist firewire-sbp2
install  firewire-sbp2 /bin/false

# Parallel ports and printer stack
blacklist lp
install  lp /bin/false

blacklist parport
install  parport /bin/false

blacklist parport_pc
install  parport_pc /bin/false

blacklist parport_serial
install  parport_serial /bin/false

blacklist ppdev
install  ppdev /bin/false

# PC speaker beep
blacklist pcspkr
install  pcspkr /bin/false

# IrDA / serial dongle style stuff
blacklist irda
install  irda /bin/false

blacklist irtty_sir
install  irtty_sir /bin/false

blacklist sir_dev
install  sir_dev /bin/false
