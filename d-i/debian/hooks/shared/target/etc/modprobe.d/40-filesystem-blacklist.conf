# Keep common installer/media filesystems such as squashfs and udf available.
blacklist minix
install  minix /bin/false

blacklist sysv
install  sysv  /bin/false

blacklist ufs
install  ufs   /bin/false

blacklist affs
install  affs  /bin/false

blacklist adfs
install  adfs  /bin/false

blacklist qnx4
install  qnx4  /bin/false

blacklist qnx6
install  qnx6  /bin/false

blacklist befs
install  befs  /bin/false

blacklist bfs
install  bfs   /bin/false

blacklist efs
install  efs   /bin/false

blacklist omfs
install  omfs  /bin/false

blacklist hpfs
install  hpfs  /bin/false

blacklist ksmbd
install  ksmbd /bin/false

blacklist cramfs
install  cramfs /bin/false

blacklist freevxfs
install  freevxfs /bin/false

blacklist jffs2
install  jffs2 /bin/false

blacklist hfs
install  hfs /bin/false

blacklist hfsplus
install  hfsplus /bin/false
