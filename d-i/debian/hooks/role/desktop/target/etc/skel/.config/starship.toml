# Single-line prompt for the managed Labwc desktop shell profile.

add_newline = false
command_timeout = 1200

format = "$username$hostname$directory$git_branch$git_status$cmd_duration$character"

[username]
show_always = true
format = '[\[$user\]]($style) '
style_user = "bold yellow"
style_root = "bold red"

[hostname]
ssh_only = false
format = '[\[$hostname\]]($style) '
style = "bold cyan"

[directory]
format = '[\[$path\]]($style) '
style = "bold green"
truncation_length = 4
truncate_to_repo = false
read_only = " ro"

[git_branch]
format = '[\[$symbol$branch\]]($style) '
symbol = "git:"
style = "bold purple"

[git_status]
format = "([$all_status$ahead_behind]($style)) "
style = "bold yellow"
conflicted = "!"
ahead = ">"
behind = "<"
diverged = "<>"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "*"
staged = "+"
renamed = "r"
deleted = "x"

[cmd_duration]
min_time = 1000
format = '[\[$duration\]]($style) '
style = "bold dimmed white"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold green)"
