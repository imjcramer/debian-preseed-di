[main]
term=xterm-256color
app-id=foot
title=foot
font=Noto Sans Mono:size=11
dpi-aware=no
pad=10x10 center
resize-delay-ms=80
initial-window-size-chars=120x34

[scrollback]
lines=10000
multiplier=3.0

[cursor]
style=beam
blink=yes

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=url-mode

[colors-dark]
alpha=0.94
foreground=f3ead7
background=111318
selection-foreground=111318
selection-background=ecb860
urls=6dc4ed
regular0=1c1f26
regular1=ca5252
regular2=7a9f64
regular3=ecb860
regular4=6f8fb5
regular5=b083c5
regular6=6ca0a3
regular7=e5ddca
bright0=4c515d
bright1=ff6b6b
bright2=98c379
bright3=f3c969
bright4=8aadf4
