# Managed by debian-preseed-di.
#
# Keep BlueZ available for WirePlumber and desktop clients, but avoid powering
# controllers eagerly during boot/login. Some controllers fail HCI setup
# commands during automatic power-on; explicit user/client activation can still
# power the adapter when Bluetooth is actually needed.

[General]
ControllerMode = dual
Experimental = false
KernelExperimental = false

[Policy]
AutoEnable=false
