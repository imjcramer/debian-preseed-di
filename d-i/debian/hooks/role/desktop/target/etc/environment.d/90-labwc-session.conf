# Managed by debian-preseed-di.
#
# User services can start before labwc-session exports its environment. Seed the
# static Labwc/Wayland identity early so D-Bus-activated helpers select the
# managed portal config, then keep GTK helpers from activating AT-SPI.
XDG_SESSION_TYPE=wayland
XDG_CURRENT_DESKTOP=labwc:wlroots
XDG_SESSION_DESKTOP=labwc
DESKTOP_SESSION=labwc
GDK_BACKEND=wayland
QT_QPA_PLATFORM=wayland
SDL_VIDEODRIVER=wayland
CLUTTER_BACKEND=wayland
GTK_A11Y=none
NO_AT_BRIDGE=1
