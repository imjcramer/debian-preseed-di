# Keep NVMe local-only by default. NVMe-oF host transports, loopback, and NVMe
# target exports stay disabled until the managed blacklist entries and matching
# GRUB systemd masks are removed intentionally for a subsystem role.
blacklist nvme_fabrics
install  nvme_fabrics /bin/false

blacklist nvme_tcp
install  nvme_tcp      /bin/false

blacklist nvme_rdma
install  nvme_rdma     /bin/false

blacklist nvme_fc
install  nvme_fc       /bin/false

blacklist nvme_loop
install  nvme_loop     /bin/false

blacklist nvmet
install  nvmet         /bin/false

blacklist nvmet_tcp
install  nvmet_tcp     /bin/false

blacklist nvmet_rdma
install  nvmet_rdma    /bin/false

blacklist nvmet_fc
install  nvmet_fc      /bin/false
