##########  Shared d-i/debian installer config  ##########
##########  Shared fragment includes  ##########
d-i preseed/include string fragments/network.cfg fragments/partman.cfg fragments/apt.cfg fragments/finish.cfg

##########  Automation defaults  ##########
d-i auto-install/enable boolean true
d-i debconf/priority string critical

##########  Installer component defaults  ##########
d-i anna/standard_modules boolean true
d-i anna/no_kernel_modules boolean false
#d-i anna/choose_modules_lowmem multiselect
d-i anna/choose_modules multiselect partman-base partman-partitioning partman-auto partman-basicfilesystems partman-btrfs partman-crypto partman-efi partman-f2fs partman-xfs cryptsetup-udeb

##########  Localization defaults  ##########
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i debian-installer/locale string en_US.UTF-8
d-i debconf/language string en
d-i localechooser/languagelist select en
d-i localechooser/shortlist select US
d-i localechooser/preferred-locale select en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8, sv_SE.UTF-8, zh_CN.UTF-8, zh_TW.UTF-8, ja_JP.UTF-8, ko_KR.UTF-8, ru_RU.UTF-8, uk_UA.UTF-8, he_IL.UTF-8, ar_SA.UTF-8, th_TH.UTF-8
d-i localechooser/translation/warn-light boolean true
d-i localechooser/translation/warn-severe boolean false

##########  Keyboard and console defaults  ##########
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us
d-i keyboard-configuration/modelcode string pc105
d-i keyboard-configuration/optionscode string
d-i keyboard-configuration/variantcode string
d-i keyboard-configuration/altgr select The default for the keyboard layout
d-i keyboard-configuration/compose select No compose key
d-i keyboard-configuration/ctrl_alt_bksp boolean false
d-i keyboard-configuration/switch select No temporary switch
d-i keyboard-configuration/toggle select No toggling
d-i keyboard-configuration/store_defaults_in_debconf_db boolean true
d-i console-setup/ask_detect boolean false
d-i console-setup/layoutcode string us
d-i console-setup/modelcode string pc105
d-i console-setup/charmap47 select UTF-8
d-i console-setup/fontface47 select Fixed
d-i console-setup/fontsize string 8x16
d-i console-setup/fontsize-text47 select 8x16
d-i console-setup/fontsize-fb47 select 8x16
d-i console-setup/store_defaults_in_debconf_db boolean true

##########  Hardware detection defaults  ##########
#d-i disk-detect/multipath/enable boolean false
d-i ethdetect/prompt_missing_firmware boolean false
d-i ethdetect/prompt_missing_firmware seen true
d-i hw-detect/load_firmware boolean true
d-i hw-detect/load_firmware seen true
d-i hw-detect/load_media boolean false
d-i hw-detect/load_media seen true

##########  Clock defaults  ##########
d-i clock-setup/hwclock-wait boolean false
